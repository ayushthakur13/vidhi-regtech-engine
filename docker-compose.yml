services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vidhi
      POSTGRES_PASSWORD: vidhi_local_dev
      POSTGRES_DB: vidhi
    ports:
      - "5432:5432"
    volumes:
      - vidhi_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  vidhi_pgdata:
